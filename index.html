<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Home Resort Astorga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0D1B3E;
    --gold: #C9A84C;
    --gold-light: #F5EDD6;
    --gold-dark: #8C6B1F;
    --white: #ffffff;
    --bg: #F4F5F8;
    --card: #ffffff;
    --text: #1A1A2E;
    --text-muted: #6B7280;
    --border: #E5E7EB;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--navy);
    padding: 20px 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .logo-wrap {
    width: 44px; height: 44px; flex-shrink: 0;
  }
  .logo-wrap svg { width: 44px; height: 44px; }
  .brand .guia-label {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    color: var(--gold); text-transform: uppercase;
  }
  .brand .brand-name {
    font-size: 20px; font-weight: 900; color: var(--white); line-height: 1.1;
  }
  .brand .brand-sub {
    font-size: 10px; font-weight: 500; letter-spacing: 2px;
    color: rgba(255,255,255,0.45); text-transform: uppercase; margin-top: 2px;
  }

  .search-bar {
    display: flex;
    gap: 8px;
  }
  .search-bar input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.35); }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: var(--radius-sm);
    padding: 10px 10px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    color: var(--white);
    outline: none;
    cursor: pointer;
    min-width: 120px;
  }
  .search-bar select option { background: var(--navy); color: var(--white); }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .stat-pill .num {
    font-size: 14px; font-weight: 700; color: var(--navy);
  }
  .stat-pill.gold .num { color: var(--gold-dark); }

  /* CATEGORY CHIPS */
  .cat-chips {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .cat-chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--white);
    color: var(--text-muted);
    white-space: nowrap;
  }
  .chip.active, .chip:hover {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }

  /* RESULTS COUNT */
  .results-info {
    padding: 10px 16px 0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* CARDS */
  .cards {
    padding: 10px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.1s;
  }
  .card.has-promo {
    border-color: var(--gold);
  }
  .card-body { padding: 14px 14px 12px; }
  .card-top {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px;
  }
  .avatar {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex-shrink: 0;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-size: 14px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-location {
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
  }
  .cat-badge {
    font-size: 10px; font-weight: 700; padding: 3px 9px;
    border-radius: 99px; flex-shrink: 0; white-space: nowrap;
  }
  .card-desc {
    font-size: 12px; line-height: 1.6; color: var(--text-muted);
    margin-bottom: 12px;
  }
  .card-links {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .link-btn {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600;
    padding: 6px 12px; border-radius: 99px;
    text-decoration: none; transition: opacity 0.15s;
    border: none; cursor: pointer;
  }
  .link-btn:hover { opacity: 0.82; }
  .link-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .btn-wa  { background: #E7F9EE; color: #1a7a40; }
  .btn-ig  { background: #FDE8F4; color: #8b1e5c; }
  .btn-tk  { background: #F0F0F0; color: #111; }

  .promo-tag {
    display: flex; align-items: flex-start; gap: 8px;
    background: var(--gold-light);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
  }
  .promo-tag svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; color: var(--gold-dark); }
  .promo-tag span { font-size: 11px; font-weight: 600; color: var(--gold-dark); line-height: 1.5; }

  /* EMPTY / LOADING */
  .state-msg {
    text-align: center; padding: 48px 16px;
    color: var(--text-muted); font-size: 14px; font-weight: 500;
  }
  .state-msg svg { margin-bottom: 12px; opacity: 0.35; }
  .spinner {
    width: 32px; height: 32px; margin: 0 auto 12px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  .footer {
    background: var(--navy);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    text-align: center;
    padding: 16px;
    letter-spacing: 0.5px;
  }
  .footer strong { color: var(--gold); }

  /* CATEGORY COLORS */
  .cat-saude    { background:#E1F5EE; color:#085041; }
  .cat-beleza   { background:#FDE8F4; color:#72243E; }
  .cat-alim     { background:#FEF3C7; color:#78350F; }
  .cat-moda     { background:#EEE8FE; color:#3C3489; }
  .cat-servicos { background:#E6F1FB; color:#0C447C; }
  .cat-pet      { background:#ECFDF5; color:#065F46; }
  .cat-outros   { background:#F3F4F6; color:#374151; }

  @media (min-width: 480px) {
    .header { padding: 20px 24px 24px; }
    .stats-bar { padding: 12px 24px; }
    .cat-chips { padding: 10px 24px; }
    .results-info { padding: 10px 24px 0; }
    .cards { padding: 10px 24px 32px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo-wrap">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#0D1B3E"/>
        <circle cx="22" cy="22" r="14" fill="none" stroke="#C9A84C" stroke-width="1.4"/>
        <circle cx="22" cy="22" r="8" fill="none" stroke="#C9A84C" stroke-width="1"/>
        <line x1="22" y1="8" x2="22" y2="36" stroke="#C9A84C" stroke-width="0.8"/>
        <line x1="8" y1="22" x2="36" y2="22" stroke="#C9A84C" stroke-width="0.8"/>
        <rect x="17" y="17" width="10" height="10" fill="#C9A84C"/>
      </svg>
    </div>
    <div class="brand">
      <div class="guia-label">Guia</div>
      <div class="brand-name">Home Resort</div>
      <div class="brand-sub">Astorga &middot; Centro Comercial</div>
    </div>
  </div>
  <div class="search-bar">
    <input type="search" id="search" placeholder="Buscar profissional ou serviço..." oninput="render()">
    <select id="catSelect" onchange="render()">
      <option value="">Todas</option>
    </select>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-pill"><span class="num" id="statTotal">—</span>&nbsp;profissionais</div>
  <div class="stat-pill gold"><span class="num" id="statPromo">—</span>&nbsp;com promoção</div>
</div>

<div class="cat-chips" id="catChips"></div>

<div class="results-info" id="resultsInfo"></div>

<div class="cards" id="cards">
  <div class="state-msg">
    <div class="spinner"></div>
    Carregando guia...
  </div>
</div>

<footer class="footer">
  <strong>Guia Home Resort Astorga</strong><br>
  R. Astorga, 370 &middot; Vila Guilhermina &middot; São Paulo &ndash; SP
</footer>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTnAVOYPyKbbvqwE3h7yWiGNIbAVmrXwjMHQI6t6BiFBOpSGxwGMAhzCqHaXyAW-2q78kdoqMVjUWF_/pub?gid=2001797307&single=true&output=csv;"

 
const CAT_STYLE = {
  "Saúde":       { cls: "cat-saude",    icon: "🏥" },
  "Beleza":      { cls: "cat-beleza",   icon: "✂️" },
  "Alimentação": { cls: "cat-alim",     icon: "🍽️" },
  "Moda":        { cls: "cat-moda",     icon: "👗" },
  "Serviços":    { cls: "cat-servicos", icon: "🔧" },
  "Pet":         { cls: "cat-pet",      icon: "🐾" },
};
function catStyle(c) { return CAT_STYLE[c] || { cls: "cat-outros", icon: "🏪" }; }

let allData = [];
let activeChip = "";

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").replace(/^"|"$/g, "").trim());
    return obj;
  }).filter(r => r["Nome do Estabelecimento"]);
}

function initChips(data) {
  const cats = [...new Set(data.map(d => d["Categoria"]).filter(Boolean))].sort();
  const sel = document.getElementById("catSelect");
  const chips = document.getElementById("catChips");

  sel.innerHTML = `<option value="">Todas</option>` + cats.map(c => `<option value="${c}">${c}</option>`).join("");

  chips.innerHTML = `<button class="chip active" onclick="setChip('')">Todos</button>` +
    cats.map(c => `<button class="chip" onclick="setChip('${c}')">${catStyle(c).icon} ${c}</button>`).join("");
}

function setChip(cat) {
  activeChip = cat;
  document.getElementById("catSelect").value = cat;
  document.querySelectorAll(".chip").forEach(c => {
    c.classList.toggle("active", c.textContent.trim().includes(cat === "" ? "Todos" : cat));
  });
  render();
}

function iconSVG(type) {
  if (type === "wa") return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.858L.057 23.882a.5.5 0 0 0 .612.612l6.083-1.485A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.667-.523-5.188-1.432l-.372-.222-3.862.944.974-3.792-.241-.386A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;
  if (type === "ig") return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`;
  if (type === "tk") return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>`;
}

function cardHTML(d) {
  const name = d["Nome do Estabelecimento"] || "";
  const floor = d["Andar"] || "";
  const block = d["Bloco"] || "";
  const cat = d["Categoria"] || "";
  const desc = d["Descrição"] || "";
  const wa = d["WhatsApp"] || "";
  const ig = d["Instagram"] || "";
  const tk = d["TikTok"] || "";
  const promo = d["Promoção para Condôminos"] || "";
  const { cls } = catStyle(cat);
  const initials = name.replace(/[—–-].*/, "").trim().split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase().slice(0, 2);

  const links = [
    wa ? `<a class="link-btn btn-wa" href="https://wa.me/${wa}" target="_blank" rel="noopener">${iconSVG("wa")} WhatsApp</a>` : "",
    ig ? `<a class="link-btn btn-ig" href="https://instagram.com/${ig}" target="_blank" rel="noopener">${iconSVG("ig")} Instagram</a>` : "",
    tk ? `<a class="link-btn btn-tk" href="https://tiktok.com/@${tk}" target="_blank" rel="noopener">${iconSVG("tk")} TikTok</a>` : "",
  ].filter(Boolean).join("");

  return `<div class="card${promo ? " has-promo" : ""}">
    <div class="card-body">
      <div class="card-top">
        <div class="avatar ${cls}">${initials}</div>
        <div class="card-meta">
          <div class="card-name">${name}</div>
          <div class="card-location">📍 ${floor}${block ? " · " + block : ""}</div>
        </div>
        <span class="cat-badge ${cls}">${cat}</span>
      </div>
      ${desc ? `<p class="card-desc">${desc}</p>` : ""}
      ${links ? `<div class="card-links">${links}</div>` : ""}
      ${promo ? `<div class="promo-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg><span>${promo}</span></div>` : ""}
    </div>
  </div>`;
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("catSelect").value;

  const filtered = allData.filter(d => {
    const matchCat = !cat || d["Categoria"] === cat;
    const matchQ = !q ||
      (d["Nome do Estabelecimento"] || "").toLowerCase().includes(q) ||
      (d["Descrição"] || "").toLowerCase().includes(q) ||
      (d["Categoria"] || "").toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const n = filtered.length;
  document.getElementById("resultsInfo").textContent =
    n === 0 ? "" : `${n} profissional${n !== 1 ? "is" : ""} encontrado${n !== 1 ? "s" : ""}`;

  const cards = document.getElementById("cards");
  if (!n) {
    cards.innerHTML = `<div class="state-msg">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Nenhum resultado para "<strong>${q || cat}</strong>"
    </div>`;
    return;
  }
  cards.innerHTML = filtered.map(cardHTML).join("");
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("Falha ao carregar planilha");
    const text = await res.text();
    allData = parseCSV(text);
    document.getElementById("statTotal").textContent = allData.length;
    document.getElementById("statPromo").textContent = allData.filter(d => d["Promoção para Condôminos"]).length;
    initChips(allData);
    render();
  } catch (e) {
    document.getElementById("cards").innerHTML = `<div class="state-msg">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Não foi possível carregar o guia.<br><small>Verifique se a planilha está pública.</small>
    </div>`;
  }
}

loadData();
</script>
</body>
</html>
